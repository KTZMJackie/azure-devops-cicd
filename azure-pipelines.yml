trigger:
  branches:
    include:
      - main

variables:
  acrName: 'jackiedevops4acr'
  acrLoginServer: 'jackiedevops4acr.azurecr.io'
  imageName: 'azure-devops-cicd'
  imageTag: '$(Build.BuildId)'
  containerAppName: 'ca-devops-cicd'
  resourceGroup: 'rg-azure-devops-cicd'

stages:
  - stage: Test
    displayName: 'Run Tests'
    jobs:
      - job: TestJob
        displayName: 'Run pytest'
        pool:
          name: Default
        steps:
          - script: |
              cd app
              pip install -r requirements.txt
              pytest test_main.py -v
            displayName: 'Install dependencies and run pytest'

  - stage: Build
    displayName: 'Build & Push Docker Image'
    dependsOn: Test
    jobs:
      - job: BuildJob
        displayName: 'Build Docker Image'
        pool:
          name: Default
        steps:
          - script: |
              docker buildx create --use --name amd64builder || true
              docker buildx build --platform linux/amd64 \
                -t $(acrLoginServer)/$(imageName):$(imageTag) \
                -t $(acrLoginServer)/$(imageName):latest \
                --push \
                ./app
            displayName: 'Build and Push amd64 image to ACR'

  - stage: Deploy
    displayName: 'Deploy to Azure Container Apps'
    dependsOn: Build
    jobs:
      - job: DeployJob
        displayName: 'Deploy Container App'
        pool:
          name: Default
        steps:
          - task: AzureCLI@2
            displayName: 'Update Container App with new image'
            inputs:
              azureSubscription: 'Azure-ServiceConnection'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp update \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --image $(acrLoginServer)/$(imageName):$(imageTag)
