trigger:
  branches:
    include:
      - main

variables:
  acrName: 'jackiedevops4acr'
  acrLoginServer: 'jackiedevops4acr.azurecr.io'
  imageName: 'azure-devops-cicd'
  imageTag: '$(Build.BuildId)'
  containerAppName: 'ca-devops-cicd'
  resourceGroup: 'rg-azure-devops-cicd'

stages:
  - stage: Build
    displayName: 'Build & Push Docker Image'
    jobs:
      - job: BuildJob
        displayName: 'Build Docker Image'
        pool:
          name: Default
        steps:
          - task: Docker@2
            displayName: 'Build and Push to ACR'
            inputs:
              command: buildAndPush
              repository: $(imageName)
              dockerfile: app/Dockerfile
              buildContext: app/
              containerRegistry: 'ACR-ServiceConnection'
              tags: |
                $(imageTag)
                latest

  - stage: Deploy
    displayName: 'Deploy to Azure Container Apps'
    dependsOn: Build
    jobs:
      - job: DeployJob
        displayName: 'Deploy Container App'
        pool:
          name: Default
        steps:
          - task: AzureCLI@2
            displayName: 'Update Container App with new image'
            inputs:
              azureSubscription: 'Azure-ServiceConnection'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp update \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --image $(acrLoginServer)/$(imageName):$(imageTag)
